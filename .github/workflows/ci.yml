name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agents/**'
      - '23127404-23127539.txt'
      - '.gitignore'
  pull_request:
    branches: [ main, master, dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agents/**'
      - '23127404-23127539.txt'
      - '.gitignore'

jobs:
  backend:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://validation:validation@127.0.0.1:1/schema_validation_only?schema=public
      DIRECT_URL: postgresql://validation:validation@127.0.0.1:1/schema_validation_only?schema=public
      JWT_SECRET: ci-access-token-secret
      JWT_REFRESH_SECRET: ci-refresh-token-secret
      CSRF_SECRET: ci-csrf-secret
      CLIENT_URL: http://localhost:5173
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Backend

      - name: Generate Prisma client
        run: npm run prisma:generate
        working-directory: Backend

      - name: Validate Prisma schema
        run: npx prisma validate
        working-directory: Backend

      - name: Typecheck and compile TypeScript
        run: npm run build
        working-directory: Backend

      - name: Run fast unit tests
        run: npm run test:unit
        working-directory: Backend

      - name: Run database & concurrency integration tests with coverage
        run: npm run test:coverage
        working-directory: Backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-lcov
          path: Backend/coverage/lcov.info
          if-no-files-found: warn

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Create Env File
        run: cp Frontend/.env.example Frontend/.env

      - name: Install dependencies
        run: npm ci
        working-directory: Frontend

      - name: Lint Frontend
        run: npm run lint
        working-directory: Frontend

      - name: Build Frontend
        run: npm run build
        working-directory: Frontend

  agent-service:
    name: AgentService Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: AgentService/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: AgentService

      - name: Build AgentService
        run: npm run build
        working-directory: AgentService

      - name: Test AgentService
        run: npm test
        working-directory: AgentService

  docker:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose Configuration
        run: docker compose config

      - name: Validate production Compose Configuration
        run: docker compose --env-file Backend/.env.example -f compose.production.yml config

  production-image:
    name: Production Image Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production backend image with GHA caching
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Oracle production stack
    needs: [backend, frontend, agent-service, docker, production-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: oracle-production-deploy
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        env:
          ORACLE_SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          ORACLE_SSH_KNOWN_HOST: ${{ secrets.ORACLE_SSH_KNOWN_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ORACLE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$ORACLE_SSH_KNOWN_HOST" > ~/.ssh/known_hosts

      - name: Deploy pushed commit
        env:
          ORACLE_SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
          ORACLE_DEPLOY_USER: ${{ secrets.ORACLE_DEPLOY_USER }}
          DEPLOY_COMMIT: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "$ORACLE_DEPLOY_USER@$ORACLE_SSH_HOST" "DEPLOY_COMMIT='$DEPLOY_COMMIT' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/online-auction/repo
          git fetch --prune origin
          git checkout --detach "$DEPLOY_COMMIT"
          docker compose --env-file /opt/online-auction/.env.production -f compose.production.yml up -d --build --remove-orphans
          REMOTE

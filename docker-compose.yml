services:
  # Local Postgres database for development and testing
  postgres:
    image: postgres:15-alpine
    container_name: online-auction-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_local_password
      POSTGRES_DB: online_auction_test
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Local Redis cache and rate limiting service
  redis:
    image: redis:7-alpine
    container_name: online-auction-redis
    ports:
      - "16379:6379"
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data

  # Local Kafka event streaming broker in KRaft mode
  kafka:
    image: apache/kafka:3.7.0
    container_name: online-auction-kafka
    ports:
      - "19092:9092"
      - "19094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:19094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
    volumes:
      - kafka_data:/var/lib/kafka/data

  # Node.js Worker (handles bidding writes, dashboard, email)
  node-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: online-auction-node-worker
    command: npm run worker
    volumes:
      - ./Backend:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:my_local_password@postgres:5432/online_auction_test?schema=public
      - DIRECT_URL=postgresql://postgres:my_local_password@postgres:5432/online_auction_test?schema=public
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - kafka

  # Multi-agent development automation service
  agent-service:
    profiles:
      - agents
    build:
      context: ./AgentService
      dockerfile: Dockerfile
    container_name: online-auction-agent-service
    command: npm start
    ports:
      - "8010:8010"
    volumes:
      - ./AgentService:/app
      - ./:/workspace/source:ro
      - agent_workspaces:/app/.agent-workspaces
      - /app/node_modules
    environment:
      - AGENT_SERVICE_PORT=8010
      - DATABASE_URL=postgresql://postgres:my_local_password@postgres:5432/online_auction_agents
      - AGENT_REPO_ROOT=/workspace/source
      - AGENT_WORKSPACE_ROOT=/app/.agent-workspaces
      - CODEX_CLI_PATH=codex
      - ANTIGRAVITY_CLI_PATH=antigravity
    depends_on:
      - postgres

  agent-worker:
    profiles:
      - agents
    build:
      context: ./AgentService
      dockerfile: Dockerfile
    container_name: online-auction-agent-worker
    command: npm run start:worker
    volumes:
      - ./AgentService:/app
      - ./:/workspace/source:ro
      - agent_workspaces:/app/.agent-workspaces
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:my_local_password@postgres:5432/online_auction_agents
      - AGENT_REPO_ROOT=/workspace/source
      - AGENT_WORKSPACE_ROOT=/app/.agent-workspaces
      - CODEX_CLI_PATH=codex
      - ANTIGRAVITY_CLI_PATH=antigravity
    depends_on:
      - postgres

  # Python AI Worker (uncomment and configure once your python codebase is ready)
  # python-worker:
  #   build:
  #     context: ./AI-Service
  #     dockerfile: Dockerfile
  #   container_name: local-python-worker
  #   command: python main.py
  #   environment:
  #     - KAFKA_BROKERS=kafka:9092
  #     - DATABASE_URL=postgresql://postgres:my_local_password@postgres:5432/online_auction_test
  #   depends_on:
  #     - postgres
  #     - kafka

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  agent_workspaces:
